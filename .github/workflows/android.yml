name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag, e.g., v1.0.0, v2.1.0
  workflow_dispatch: 

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare Signing Key and Environment
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD_SECRET: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_SECRET: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Resolve passwords (use secret if exists, otherwise fallback to default values)
          STORE_PASS="${STORE_PASSWORD_SECRET:-quickprint_store}"
          KEY_PASS="${KEY_PASSWORD_SECRET:-quickprint_key}"
          
          # Export them to GITHUB_ENV so subsequent Gradle steps can access them as env vars
          echo "STORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASS" >> $GITHUB_ENV
          
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore from secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            echo "No release keystore secret found. Generating a temporary keystore for building..."
            keytool -genkeypair -v \
              -keystore my-upload-key.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=QuickPrint, O=AI Studio, C=US"
          fi

      - name: Generate Gradle Wrapper
        # Fixes the 'gradlew not found' error by generating the wrapper using the runner's pre-installed Gradle
        run: gradle wrapper
  
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
