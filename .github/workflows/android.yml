name: Create Android Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow whenever you push a tag like v1.0.0, v1.2.1, etc.
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Grants permission to create releases and upload files

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        # Fixes the 'gradlew not found' error by generating the wrapper using the runner's pre-installed Gradle
        run: gradle wrapper

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Release APK
        # Compiles the production build of your application
        run: ./gradlew assembleRelease

      - name: Gather Built APKs
        # Gathers any compiled APK files from build outputs and prepares them for the release
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} release-artifacts/ \;

      - name: Create GitHub Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true # Automatically summarizes git commits since last tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub Actions
