name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to trigger the workflow manually from the Actions tab

jobs:
  build:
    name: Build & Release Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode or Generate Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'temporaryPassword123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'temporaryPassword123' }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️ KEYSTORE_BASE64 secret is missing. Generating a temporary self-signed keystore for testing..."
            keytool -genkey -v \
              -keystore my-upload-key.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -alias upload \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=QuickPrint, OU=AIStudio, O=Google, L=Mountain View, S=California, C=US"
          else
            echo "✅ KEYSTORE_BASE64 secret found. Decoding to my-upload-key.jks..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          fi
      - name: Generate Gradle Wrapper
        # Fixes the 'gradlew not found' error by generating the wrapper using the runner's pre-installed Gradle
        run: gradle wrapper
  
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'temporaryPassword123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'temporaryPassword123' }}
        run: ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
